<svg xmlns="http://www.w3.org/2000/svg" width="900" height="280" viewBox="0 0 900 280">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   style="stop-color:#38bdf8;stop-opacity:1" />
      <stop offset="50%"  style="stop-color:#818cf8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c084fc;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   style="stop-color:#38bdf8;stop-opacity:1" />
      <stop offset="60%"  style="stop-color:#818cf8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c084fc;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="iconGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   style="stop-color:#3178c6;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#3178c6;stop-opacity:0" />
    </radialGradient>
    <linearGradient id="codeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   style="stop-color:#1e293b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:1" />
    </linearGradient>
  </defs>

  <rect width="900" height="280" fill="url(#bgGrad)" rx="12" />

  <g opacity="0.06" stroke="#94a3b8" stroke-width="0.5">
    <line x1="60"  y1="0" x2="60"  y2="280" />
    <line x1="120" y1="0" x2="120" y2="280" />
    <line x1="180" y1="0" x2="180" y2="280" />
    <line x1="240" y1="0" x2="240" y2="280" />
    <line x1="300" y1="0" x2="300" y2="280" />
    <line x1="360" y1="0" x2="360" y2="280" />
    <line x1="420" y1="0" x2="420" y2="280" />
    <line x1="480" y1="0" x2="480" y2="280" />
    <line x1="540" y1="0" x2="540" y2="280" />
    <line x1="600" y1="0" x2="600" y2="280" />
    <line x1="660" y1="0" x2="660" y2="280" />
    <line x1="720" y1="0" x2="720" y2="280" />
    <line x1="780" y1="0" x2="780" y2="280" />
    <line x1="840" y1="0" x2="840" y2="280" />
    <line x1="0" y1="40"  x2="900" y2="40"  />
    <line x1="0" y1="80"  x2="900" y2="80"  />
    <line x1="0" y1="120" x2="900" y2="120" />
    <line x1="0" y1="160" x2="900" y2="160" />
    <line x1="0" y1="200" x2="900" y2="200" />
    <line x1="0" y1="240" x2="900" y2="240" />
  </g>

  <rect x="0" y="0" width="900" height="3" fill="url(#accentGrad)" rx="2" />
  <rect x="0" y="277" width="900" height="3" fill="url(#accentGrad)" rx="2" />

  <!-- TS Icon -->
  <circle cx="100" cy="140" r="70" fill="url(#iconGlow)" />
  <rect x="56" y="96" width="88" height="88" rx="12" fill="#3178c6" opacity="0.15" />
  <rect x="62" y="102" width="76" height="76" rx="8" fill="none" stroke="#3178c6" stroke-width="2" opacity="0.6" />
  <text x="100" y="152" text-anchor="middle" font-family="'Courier New', Courier, monospace" font-size="36" font-weight="700" fill="#3178c6" opacity="0.9">TS</text>
  <!-- Gear teeth around the icon -->
  <circle cx="100" cy="140" r="52" fill="none" stroke="#3178c6" stroke-width="1" opacity="0.3" stroke-dasharray="6 8" />

  <!-- Package name -->
  <text x="175" y="100" font-family="'Courier New', Courier, monospace" font-size="28" font-weight="700" fill="url(#textGrad)">@stackra/</text>
  <text x="175" y="128" font-family="'Courier New', Courier, monospace" font-size="28" font-weight="700" fill="url(#textGrad)">typescript-config</text>

  <!-- Description -->
  <text x="175" y="153" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" fill="#94a3b8">Shared TypeScript configuration presets for Stackra packages</text>

  <!-- Preset badges -->
  <rect x="175" y="166" width="42" height="22" rx="11" fill="#0c4a6e" stroke="#38bdf8" stroke-width="1" />
  <text x="196" y="181" text-anchor="middle" font-family="monospace" font-size="11" fill="#38bdf8">base</text>

  <rect x="224" y="166" width="62" height="22" rx="11" fill="#1e1b4b" stroke="#818cf8" stroke-width="1" />
  <text x="255" y="181" text-anchor="middle" font-family="monospace" font-size="11" fill="#818cf8">bundler</text>

  <rect x="293" y="166" width="42" height="22" rx="11" fill="#2e1065" stroke="#c084fc" stroke-width="1" />
  <text x="314" y="181" text-anchor="middle" font-family="monospace" font-size="11" fill="#c084fc">next</text>

  <rect x="342" y="166" width="72" height="22" rx="11" fill="#0c4a6e" stroke="#38bdf8" stroke-width="1" />
  <text x="378" y="181" text-anchor="middle" font-family="monospace" font-size="11" fill="#38bdf8">react-lib</text>

  <rect x="421" y="166" width="62" height="22" rx="11" fill="#1e1b4b" stroke="#818cf8" stroke-width="1" />
  <text x="452" y="181" text-anchor="middle" font-family="monospace" font-size="11" fill="#818cf8">nest-lib</text>

  <rect x="175" y="194" width="72" height="22" rx="11" fill="#2e1065" stroke="#c084fc" stroke-width="1" />
  <text x="211" y="209" text-anchor="middle" font-family="monospace" font-size="11" fill="#c084fc">rn-app</text>

  <rect x="254" y="194" width="62" height="22" rx="11" fill="#0c4a6e" stroke="#38bdf8" stroke-width="1" />
  <text x="285" y="209" text-anchor="middle" font-family="monospace" font-size="11" fill="#38bdf8">rn-lib</text>

  <!-- Version badge -->
  <rect x="175" y="224" width="56" height="20" rx="10" fill="#1e293b" stroke="#475569" stroke-width="1" />
  <text x="203" y="238" text-anchor="middle" font-family="monospace" font-size="10" fill="#94a3b8">v1.0.5</text>

  <!-- Code snippet -->
  <rect x="560" y="30" width="320" height="220" rx="8" fill="url(#codeGrad)" stroke="#334155" stroke-width="1" />
  <circle cx="580" cy="50" r="5" fill="#ef4444" opacity="0.8" />
  <circle cx="596" cy="50" r="5" fill="#f59e0b" opacity="0.8" />
  <circle cx="612" cy="50" r="5" fill="#22c55e" opacity="0.8" />
  <text x="680" y="54" text-anchor="middle" font-family="monospace" font-size="10" fill="#64748b">tsconfig.json</text>
  <line x1="560" y1="62" x2="880" y2="62" stroke="#334155" stroke-width="1" />

  <text x="576" y="82"  font-family="'Courier New', Courier, monospace" font-size="11" fill="#64748b">// tsconfig.json</text>
  <text x="576" y="102" font-family="'Courier New', Courier, monospace" font-size="11" fill="#e2e8f0">{</text>
  <text x="576" y="122" font-family="'Courier New', Courier, monospace" font-size="11" fill="#94a3b8">  "extends":</text>
  <text x="576" y="142" font-family="'Courier New', Courier, monospace" font-size="11" fill="#86efac">    "@stackra/typescript-config</text>
  <text x="576" y="162" font-family="'Courier New', Courier, monospace" font-size="11" fill="#86efac">     /bundler"</text>
  <text x="576" y="186" font-family="'Courier New', Courier, monospace" font-size="11" fill="#64748b">  // Presets: base, bundler,</text>
  <text x="576" y="204" font-family="'Courier New', Courier, monospace" font-size="11" fill="#64748b">  // next, react-lib, nest-lib,</text>
  <text x="576" y="222" font-family="'Courier New', Courier, monospace" font-size="11" fill="#64748b">  // react-native-app/lib</text>
  <text x="576" y="242" font-family="'Courier New', Courier, monospace" font-size="11" fill="#e2e8f0">}</text>
</svg>
